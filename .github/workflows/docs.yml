name: Generate pdoc documentation

# build the documentation when a new tag is pushed or with a manual trigger
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

# security: restrict permissions for CI jobs.
permissions:
  contents: read

jobs:
  # Build the documentation and upload the static HTML files as an artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # ADJUST THIS: install all dependencies (including pdoc)
      - run: pip install -e ".[remote-store, export-tiff, converter]"
      - run: pip install pdoc
      # Have the full version (including the .postN/.devN+commit suffix) as generated by via hatch-vcs
      # in the BRIMFILE_VERSION_FULL variable
      # Use the nearest reachable release tag (e.g. "v1.7.0" or "v1.7.0rc1") 
      # in the BRIMFILE_VERSION variable
      - name: Read brimfile version
        run: |
          echo 'BRIMFILE_VERSION_FULL='"$(python -c 'import brimfile; print("v" + brimfile.__version__)')" >> "$GITHUB_ENV"
          echo "BRIMFILE_VERSION=$(git describe --tags --abbrev=0 --match 'v[0-9]*')" >> "$GITHUB_ENV"
      # ADJUST THIS: build your documentation into docs/.
      - run: >
          pdoc src/brimfile --docformat google -o docs
          --footer-text "Documentation for brimfile ${BRIMFILE_VERSION_FULL}"
          --favicon https://raw.githubusercontent.com/brillouin-imaging/brimfile/main/brimfile_logo.png
          --logo https://raw.githubusercontent.com/brillouin-imaging/brimfile/main/brimfile_logo.png
          -t docs_template


      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  # Deploy the artifact to GitHub pages.
  # This is a separate job so that only actions/deploy-pages has the necessary permissions.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
